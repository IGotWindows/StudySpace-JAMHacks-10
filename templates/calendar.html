{% extends "base.html" %}
{% block title %}Calendar — Study Space{% endblock %}
{% block content %}
<div class="calendar-page">
<h1 class="page-title">Calendar</h1>

<div class="card calendar-card">
  <div class="calendar-toolbar">
    <button type="button" id="prev-month" class="btn secondary" aria-label="Previous month">←</button>
    <h2 id="month-label" class="month-label"></h2>
    <button type="button" id="next-month" class="btn secondary" aria-label="Next month">→</button>
    <button type="button" id="today-btn" class="btn primary">Today</button>
  </div>

  <div id="calendar-grid" class="calendar-grid">
    <div class="calendar-day-header">Mon</div>
    <div class="calendar-day-header">Tue</div>
    <div class="calendar-day-header">Wed</div>
    <div class="calendar-day-header">Thu</div>
    <div class="calendar-day-header">Fri</div>
    <div class="calendar-day-header">Sat</div>
    <div class="calendar-day-header">Sun</div>
  </div>
</div>

<div id="day-panel" class="card day-panel hidden">
  <div class="day-panel-header">
    <h2 id="selected-date-label">Select a day</h2>
    <button type="button" id="close-panel-btn" class="btn secondary btn-small" aria-label="Close">✕</button>
  </div>
  <ul id="selected-day-events" class="panel-event-list"></ul>
  <p id="no-events-msg" class="no-events-msg hidden">No events yet. Add one below.</p>
  <div class="add-event-form">
    <input id="new-event-input" type="text" placeholder="Event name, e.g. Algebra quiz">
    <div class="time-inputs">
      <div id="event-start-picker" class="time-picker-box">
        <span class="time-picker-heading">Start</span>
        <button type="button" class="time-picker-btn">All day</button>
        <button type="button" class="time-clear-btn">Clear</button>
      </div>
      <div id="event-end-picker" class="time-picker-box">
        <span class="time-picker-heading">End</span>
        <button type="button" class="time-picker-btn">All day</button>
        <button type="button" class="time-clear-btn">Clear</button>
      </div>
    </div>
    <label class="event-assessment-check">
      <input id="new-event-assessment" type="checkbox">
      <span>This is an assessment</span>
    </label>
    <button type="button" id="add-event-btn" class="btn primary">Add Event</button>
  </div>
</div>

<script id="calendar-init-data" type="application/json">{{ calendar_json|safe }}</script>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/calendar-events.js') }}"></script>
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
{% endblock %}
