{% extends "base.html" %}
{% block title %}Focus — Studious{% endblock %}
{% block content %}
<h1 class="page-title">Focus Session</h1>
<p class="page-subtitle">Use the Pomodoro timer to stay on task. Optional webcam preview for accountability.</p>

<div class="focus-grid">
  <div class="card">
    <h2>Pomodoro Timer</h2>
    <div id="timer">25:00</div>
    <div class="hero-buttons">
      <button class="btn primary" onclick="startTimer()">Start</button>
      <button class="btn secondary" onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <div class="card">
    <h2>Webcam Preview</h2>
    <video id="cam" autoplay playsinline muted></video>
    <p id="status" class="status-text">Camera not started.</p>
    <div class="hero-buttons">
      <button class="btn primary" onclick="startCamera()">Start Camera</button>
      <button class="btn secondary" onclick="closeCamera()">Close Camera</button>
    </div>
  </div>
</div>
{% endblock %}
