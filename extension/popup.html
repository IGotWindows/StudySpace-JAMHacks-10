<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Space</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
    }

    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #1e1e2e;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }

    .main-btn {
      display: block;
      width: calc(100% - 24px);
      margin: 14px 12px 0;
      padding: 11px 0;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .main-btn:hover {
      opacity: 0.88;
    }

    .main-btn.active {
      background: #1e1e2e;
      border: 1px solid #7c3aed;
      color: #a78bfa;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 14px 12px 6px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 0 12px 14px;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 6px;
      background: #1a1a25;
      border: 1px solid #2d2d40;
      border-radius: 8px;
      color: #9ca3af;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .nav-btn:hover {
      background: #242436;
      border-color: #7c3aed;
      color: #c4b5fd;
    }

    .nav-btn .icon {
      font-size: 18px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid #1e1e2e;
      font-size: 11px;
      color: #4b5563;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
    }

    .status-dot.running {
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">StudySpace</div>
    <div class="tagline">Your floating study companion</div>
  </div>

  <button class="main-btn" id="openBtn">Open Widget</button>

  <div class="section-label">Jump to</div>
  <div class="nav-grid">
    <button class="nav-btn" data-path="/dashboard">
      <span class="icon">🏠</span>Dashboard
    </button>
    <button class="nav-btn" data-path="/focus">
      <span class="icon">🎯</span>Focus
    </button>
    <button class="nav-btn" data-path="/study">
      <span class="icon">📚</span>Study
    </button>
    <button class="nav-btn" data-path="/education">
      <span class="icon">🎓</span>Education
    </button>
    <button class="nav-btn" data-path="/health">
      <span class="icon">❤️</span>Health
    </button>
    <button class="nav-btn" data-path="/calendar">
      <span class="icon">📅</span>Calendar
    </button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Widget closed</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
