{% extends "base.html" %}
{% block title %}Focus — Studious{% endblock %}
{% block content %}
<h1 class="page-title">Focus</h1>
<p class="page-subtitle">Stay on task with a Pomodoro timer. Turn on your webcam for a little extra accountability.</p>

<div class="focus-grid">
  <div class="card">
    <h2>Pomodoro Timer</h2>
    <div id="timer">25:00</div>
    <div class="hero-buttons">
      <button class="btn primary" onclick="startTimer()">Start</button>
      <button class="btn secondary" onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <div class="card">
    <h2>Webcam</h2>
    <video id="cam" autoplay playsinline muted></video>
    <p id="status" class="status-text">Camera off</p>
    <div class="hero-buttons">
      <button class="btn primary" onclick="startCamera()">Turn On</button>
      <button class="btn secondary" onclick="closeCamera()">Turn Off</button>
    </div>
  </div>
</div>
{% endblock %}
